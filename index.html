<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Someone Special</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
      background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('https://source.unsplash.com/1600x900/?nature');
      background-size: cover;
      background-position: center;
      font-family: 'Georgia', serif;
      color: #2c3e50;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.3);
    }
    .container {
      text-align: center;
      max-width: 800px;
      padding: 40px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 10px;
      z-index: 1; /* Ensure content is above overlay */
    }
    h1 {
      font-size: 3em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      color: #34495e;
    }
    p {
      font-size: 1.8em;
      color: #7f8c8d;
      line-height: 1.6;
      font-style: italic;
      margin: 0 auto;
      max-width: 80%;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <h1>Sorry, I don't even shoot my shot</h1>
    <p>I met you when I was not looking for you and lost you when I loved you the most!</p>
  </div>
</body>
</html>
